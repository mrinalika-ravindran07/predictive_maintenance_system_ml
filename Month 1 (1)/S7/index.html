<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroHealth AI | Predictive Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #4F46E5; /* Indigo */
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1f2937;
        }

        /* --- Glassmorphism Dashboard Card --- */
        .dashboard {
            display: flex;
            width: 900px;
            height: 580px;
            background: var(--glass);
            border-radius: 30px;
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Left Panel: Inputs */
        .panel-left {
            width: 40%;
            padding: 50px;
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255,255,255,0.4);
        }

        /* Right Panel: Visualization */
        .panel-right {
            width: 60%;
            padding: 50px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; color: #111827; letter-spacing: -0.02em; }
        .subtitle { font-size: 0.95rem; color: #6b7280; margin-bottom: 40px; line-height: 1.5; }

        /* --- Modern Inputs --- */
        .input-group { margin-bottom: 25px; }
        
        label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #374151; 
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 50px; /* Space for icon */
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Inter', sans-serif;
            background: #f9fafb;
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        
        input:focus + i { color: var(--primary); }

        /* --- Action Button --- */
        .btn-primary {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-primary:hover { 
            background: var(--primary-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }
        
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { background: #a5a6f6; cursor: not-allowed; transform: none; }

        /* --- Chart Area --- */
        .chart-container {
            width: 320px;
            height: 320px;
            position: relative;
            margin-bottom: 20px;
        }

        .risk-stat {
            text-align: center;
            opacity: 0; 
            transform: translateY(20px);
            transition: all 0.6s ease;
        }
        
        .risk-stat.visible { opacity: 1; transform: translateY(0); }

        .risk-value { font-size: 4rem; font-weight: 800; color: #111827; line-height: 1; }
        .risk-label { font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-top: 10px; }

        /* Status Colors */
        .status-low { color: #10B981; }    /* Green */
        .status-med { color: #F59E0B; }    /* Orange */
        .status-high { color: #EF4444; }   /* Red */

        /* Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel-left">
            <h1><i class="fas fa-brain" style="color: var(--primary);"></i> NeuroHealth</h1>
            <p class="subtitle">AI-powered diabetic progression analysis. Enter patient metrics below.</p>

            <div class="input-group">
                <label>Patient Age (Years)</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-clock"></i>
                    <input type="number" id="age" placeholder="e.g. 50">
                </div>
            </div>

            <div class="input-group">
                <label>Body Mass Index (BMI)</label>
                <div class="input-wrapper">
                    <i class="fas fa-weight-scale"></i>
                    <input type="number" id="bmi" placeholder="e.g. 28.5">
                </div>
            </div>

            <button class="btn-primary" onclick="predict()" id="predictBtn">
                <div class="spinner" id="spinner"></div>
                <span id="btnText">Run Analysis</span>
            </button>
        </div>

        <div class="panel-right">
            <div class="chart-container">
                <canvas id="riskChart"></canvas>
            </div>
            
            <div id="resultBox" class="risk-stat">
                <div class="risk-value" id="scoreValue">--</div>
                <div class="risk-label" id="scoreLabel">Ready to Scan</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Initialize Chart (Empty State) ---
        const ctx = document.getElementById('riskChart').getContext('2d');
        
        // Custom plugin to draw text in center of doughnut (optional, kept simple here)
        let myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Risk Score', 'Safe Buffer'],
                datasets: [{
                    data: [0, 350], 
                    backgroundColor: ['#e5e7eb', '#f3f4f6'],
                    borderWidth: 0,
                    cutout: '85%', // Thin modern ring
                    borderRadius: 20
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                animation: { animateScale: true, animateRotate: true, duration: 1500 }
            }
        });

        // --- 2. Main Logic Function ---
        async function predict() {
            const ageInput = document.getElementById('age');
            const bmiInput = document.getElementById('bmi');
            const btn = document.getElementById('predictBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            
            // --- VALIDATION: Prevent "BMI 2" ---
            const ageVal = parseFloat(ageInput.value);
            const bmiVal = parseFloat(bmiInput.value);

            if (!ageInput.value || !bmiInput.value) {
                alert("⚠️ Missing Data: Please enter both Age and BMI.");
                return;
            }

            if (bmiVal < 10 || bmiVal > 60) {
                alert("⚠️ Invalid BMI: Please enter a realistic value (between 10 and 60).");
                return;
            }
            
            if (ageVal < 0 || ageVal > 120) {
                alert("⚠️ Invalid Age: Please enter a realistic age.");
                return;
            }

            // --- UI: Loading State ---
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = "Analyzing...";
            
            // Reset Chart slightly for effect
            myChart.data.datasets[0].backgroundColor = ['#e5e7eb', '#f3f4f6'];
            myChart.update();

            try {
                // --- API Call to Python Backend ---
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        age: ageVal, 
                        bmi: bmiVal 
                    })
                });

                const data = await response.json();
                
                // If backend returns error or null
                if (!data.disease_progression) throw new Error("Invalid response");

                const score = parseFloat(data.disease_progression).toFixed(0);

                // --- UI: Update Results ---
                updateDashboard(score);

            } catch (error) {
                console.error(error);
                alert("❌ Connection Error: Is your Python backend running? Check VS Code terminal.");
            }

            // --- UI: Restore Button ---
            btn.disabled = false;
            spinner.style.display = 'none';
            btnText.innerText = "Run Analysis";
        }

        // --- 3. Dashboard Update Logic ---
        function updateDashboard(score) {
            const label = document.getElementById('scoreLabel');
            const value = document.getElementById('scoreValue');
            const resultBox = document.getElementById('resultBox');

            // Determine Severity & Color Scheme
            let color, severity, bgRing;
            
            if (score < 100) {
                color = '#10B981'; // Green
                severity = "Low Risk";
            } else if (score < 200) {
                color = '#F59E0B'; // Orange
                severity = "Moderate Risk";
            } else {
                color = '#EF4444'; // Red
                severity = "High Risk";
            }

            // Update Text
            value.innerText = score;
            value.style.color = color;
            label.innerText = severity;
            label.style.color = color;
            resultBox.classList.add('visible');

            // Update Chart Data & Colors
            const maxScore = 350; // Estimated max from dataset
            const remaining = maxScore - score;

            myChart.data.datasets[0].data = [score, remaining > 0 ? remaining : 0];
            myChart.data.datasets[0].backgroundColor = [color, '#f3f4f6'];
            myChart.update();
        }
    </script>
</body>
</html>
